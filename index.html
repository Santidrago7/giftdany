<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#13051f" />
    <meta
      name="description"
      content="Árbol de recuerdos interactivo con fotos, ramas luminosas y mensajes en las raíces."
    />
    <title>Árbol de Recuerdos</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Great+Vibes&family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="icon" href="assets/favicon.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="styles.css" />
    <script src="data/memories.js" defer></script>
    <script src="app.js" defer></script>
  </head>

  <body>
    <main class="memory-page" aria-label="Árbol de recuerdos interactivo">
      <div class="aurora aurora-one"></div>
      <div class="aurora aurora-two"></div>
      <div class="moon" aria-hidden="true"></div>
      <div class="mountains" aria-hidden="true"></div>
      <div class="bottom-glow" aria-hidden="true"></div>

      <header class="topbar">
        <a class="brand" href="#treeStage" aria-label="Volver al árbol de recuerdos">
          <span class="brand-icon" aria-hidden="true">
            <svg viewBox="0 0 64 64" role="img">
              <path d="M32 54S8 39.8 8 21.7C8 12.5 18.8 7.4 26.1 14.5L32 20l5.9-5.5C45.2 7.4 56 12.5 56 21.7 56 39.8 32 54 32 54Z" />
              <path d="M16 34c7-1 12 2 16 8 4-6 9-9 16-8" />
            </svg>
          </span>
          <span>
            <strong>aqui tienes un pequeño regalo de mi parte</strong>
          </span>
        </a>

        <nav class="top-actions" aria-label="Acciones del árbol">
          <button class="ghost-button" type="button" id="replayTreeButton">
            <span aria-hidden="true">✦</span>
            Revivir
          </button>
          <button class="ghost-button" type="button" id="nextMemoryButton">
            <span aria-hidden="true">♡</span>
            Siguiente recuerdo
          </button>
        </nav>
      </header>

      <section class="tree-stage" id="treeStage">
        <svg
          id="memoryTree"
          class="memory-tree"
          viewBox="0 0 1600 900"
          preserveAspectRatio="xMidYMid meet"
        >
          <title id="treeTitle">Árbol de recuerdos luminoso</title>
          <desc id="treeDescription">
          </desc>

          <defs id="svgDefs">
            <radialGradient id="photoFrameGradient" cx="35%" cy="25%" r="70%">
              <stop offset="0%" stop-color="#fff8d9" />
              <stop offset="42%" stop-color="#ffc86b" />
              <stop offset="72%" stop-color="#ff4fc3" />
              <stop offset="100%" stop-color="#6034ff" />
            </radialGradient>

            <radialGradient id="softNodeGlow" cx="50%" cy="50%" r="50%">
              <stop offset="0%" stop-color="rgba(255, 255, 255, .96)" />
              <stop offset="36%" stop-color="rgba(255, 196, 122, .55)" />
              <stop offset="100%" stop-color="rgba(255, 79, 195, 0)" />
            </radialGradient>

            <filter id="lineGlow" x="-80%" y="-80%" width="260%" height="260%">
              <feGaussianBlur stdDeviation="3.5" result="coloredBlur" />
              <feMerge>
                <feMergeNode in="coloredBlur" />
                <feMergeNode in="SourceGraphic" />
              </feMerge>
            </filter>

            <filter id="strongGlow" x="-120%" y="-120%" width="340%" height="340%">
              <feGaussianBlur stdDeviation="7" result="blurOne" />
              <feGaussianBlur stdDeviation="15" result="blurTwo" />
              <feMerge>
                <feMergeNode in="blurTwo" />
                <feMergeNode in="blurOne" />
                <feMergeNode in="SourceGraphic" />
              </feMerge>
            </filter>

            <filter id="rootGlow" x="-100%" y="-100%" width="300%" height="300%">
              <feGaussianBlur stdDeviation="4" result="rootBlur" />
              <feColorMatrix
                in="rootBlur"
                type="matrix"
                values="1 0 0 0 0.25  0 1 0 0 0.03  0 0 1 0 0.22  0 0 0 0.72 0"
                result="coloredRoot"
              />
              <feMerge>
                <feMergeNode in="coloredRoot" />
                <feMergeNode in="SourceGraphic" />
              </feMerge>
            </filter>
          </defs>

          <g id="starLayer"></g>
          <g id="rootLayer"></g>
          <g id="branchLayer"></g>
          <g id="leafLayer"></g>
          <g id="photoLayer"></g>
          <g id="sparkleLayer"></g>
        </svg>

        <div class="root-copy" aria-live="polite">
          <span class="root-label" id="rootMemoryTitle">Raíces del árbol</span>
          <p class="root-message" id="rootMessageText">por si nos extañas hay secretitos dentro jejej</p>
        </div>
      </section>
    </main>
  </body>
</html>
